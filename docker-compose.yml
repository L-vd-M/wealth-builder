# Wealth Builder — Raspberry Pi production stack
# Usage: docker compose up -d --build

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: marketcommand
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"   # local access only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d marketcommand"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/marketcommand
      CLERK_JWKS_URL: ${CLERK_JWKS_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-notifications@yourdomain.com}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      AGENT_TEMPLATES_PATH: ${AGENT_TEMPLATES_PATH:-/opt/project-agent-templates}
      INTERNAL_API_BASE: ${INTERNAL_API_BASE:-http://localhost:8000}
    volumes:
      - ./project-agent-templates:/opt/project-agent-templates:ro
    ports:
      - "127.0.0.1:8000:8000"   # only reachable via nginx / cloudflared

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - nginx
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  postgres_data:
